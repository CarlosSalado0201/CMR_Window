    <!-- 🔻 BARRA SUPERIOR -->
    <div class="toolbar">
    <img src="assets/CMR.jpg" style="cursor:pointer" routerLink="/inicio" />
    <button routerLink="/calculadora">Abrir calculadora</button>
    <button routerLink="/editar">Editar inventario</button>
    <button routerLink="/historial">Historial de reportes</button>
    <button routerLink="/login">Cerrar sesión</button>
    </div>

    <div class="calendar-container">

    <!-- 🔻 Encabezado del calendario -->
    <div class="calendar-header">
  <div class="month-year-container">
    <button class="prev-month" (click)="prevMonth()">&#9664;</button>

    <span class="month-year">{{ monthNames[currentMonth] }} {{ currentYear }}</span>

    <button class="next-month" (click)="nextMonth()">&#9654;</button>

    <button class="calendar-picker-btn" (click)="toggleMiniCalendar()">📅</button>

    <!-- Mini calendario emergente -->
    <div class="mini-calendar" *ngIf="showMiniCalendar">
      <div class="months">
        <button *ngFor="let month of monthNames; let i = index"
                (click)="selectMonth(i)">{{ month }}</button>
      </div>
      <div class="years">
        <button *ngFor="let y of years" (click)="selectYear(y)">{{ y }}</button>
      </div>
    </div>
  </div>
</div>


    <!-- 🔻 Días de la semana -->
    <div class="calendar-weekdays">
        <div *ngFor="let day of weekDays">{{ day }}</div>
    </div>

    <!-- 🔻 Cuadros del mes -->
    <div class="calendar-grid">
        <div class="calendar-day"
            *ngFor="let day of daysInMonth"
            [class.empty]="day === 0"
            (click)="selectDate(day)"
        >
        <span *ngIf="day !== 0">{{ day }}</span>
        </div>
    </div>

    </div>
